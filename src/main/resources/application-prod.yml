# Application configuration for NoyBlog - Production
spring:
  datasource:
    url: ${DB_PROD_URL}
    username: ${DB_PROD_USERNAME}
    password: ${DB_PROD_PASSWORD}

# MinIO configuration
minio:
  accessKey: ${MINIO_ACCESS_KEY}
  secretKey: ${MINIO_SECRET_KEY}
  endpoint: ${MINIO_ENDPOINT}

server:
  port: 8085
  servlet:
    context-path: /api

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:https://blog.grummans.me,https://adminblog.grummans.me}