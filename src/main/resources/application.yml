# Application configuration for NoyBlog
# Database connection settings
spring:
  application:
    name: noyblog
  profiles:
    default: dev
  banner:
    location: classpath:banner.txt
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  metrics:
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
