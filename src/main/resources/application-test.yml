# Application configuration for NoyBlog - Test Environment
# Uses H2 in-memory database for CI/CD testing
spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    open-in-view: false
  h2:
    console:
      enabled: false

# MinIO test configuration (mock values - not used in tests)
minio:
  endpoint: http://localhost:9000
  accessKey: testAccessKey
  secretKey: testSecretKey
  bucketName: test-bucket

server:
  port: 8085
  servlet:
    context-path: /api

# No CORS needed for tests as requested

