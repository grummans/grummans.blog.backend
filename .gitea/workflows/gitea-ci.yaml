name: Build and Push Container Image
runs-name: ${{ gitea.actor }} - Build and Push Container Image
on:
  push:
    branches:
      - dev

env:
  CONTAINER_IMAGE_NAME: grummans.blog.backend

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.REGISTRY_DOMAIN }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Calculate short SHA
        id: calc_sha
        run: echo "short_sha=${{ github.sha::0:7 }}" >> "$GITEA_OUTPUT"

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          Dockerfile: ./Dockerfile
          tags: |
            ${{ env.REGISTRY_DOMAIN }}/${{ env.CONTAINER_IMAGE_NAME }}:{{ steps.calc_sha.outputs.short_sha }}
            ${{ env.REGISTRY_DOMAIN }}/${{ env.CONTAINER_IMAGE_NAME }}:latest