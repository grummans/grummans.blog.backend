name: CI/CD - Build, Test, and Publish Container
run-name: ${{ gitea.actor }} - CI/CD

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  pull_request:
    branches:
      - main

concurrency:
  group: gitea-cicd-${{ gitea.ref }}
  cancel-in-progress: true

env:
  REGISTRY_DOMAIN: gitea.grummans.me
  CONTAINER_IMAGE_NAME: grummans.blog.backend

jobs:
  ci:
    name: CI - Maven Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Prepare Maven wrapper
        shell: bash
        run: |
          sed -i 's/\r$//' mvnw
          chmod +x mvnw

      - name: Run unit tests and package
        shell: bash
        run: bash ./mvnw -B -ntp clean verify

  cd:
    name: CD - Build and Push Image
    runs-on: ubuntu-latest
    if: startsWith(gitea.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY_DOMAIN }}/${{ gitea.repository_owner }}/${{ env.CONTAINER_IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=sha,format=short,prefix=
            type=raw,value=latest

      - name: Log in to Gitea Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY_DOMAIN }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}